<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IELTS Speaking & Discussion Mastery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 850px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dropdown { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #2980b9; border-radius: 6px; font-size: 16px; }
        button { background: #2c3e50; color: white; border: none; padding: 15px; width: 48%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #output { margin-top: 20px; padding: 20px; background: #dff9fb; border-radius: 6px; display: none; font-size: 1.1em; }
        .tts-btn { background: #8e44ad; width: 100%; margin-top: 10px; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Speaking/Discussion Mastery (1/50)</h2>
    <p id="prompt"><strong>Prompt:</strong> Loading...</p>
    
    <label><b>Subject/Theme</b></label>
    <select id="cause" class="dropdown"><option value="">-- Select --</option></select>
    
    <label><b>Analytical Verbs</b></label>
    <select id="verb" class="dropdown"><option value="">-- Select --</option></select>
    
    <label><b>Consequence/Insight</b></label>
    <select id="effect" class="dropdown"><option value="">-- Select --</option></select>
    
    <button onclick="evaluateDrill()">Submit & Evaluate</button>
    <button style="background:#27ae60" onclick="nextCase()">Next Case &raquo;</button>
    
    <div id="output"></div>
    <button id="tts" class="tts-btn" onclick="speakResult()" style="display:none;">🔊 Listen to Discussion Point</button>
</div>

<script>
    const data = [
        // Personal & Professional
        { q: "Tell me about your career goals.", causes: ["Getting a promotion", "Professional advancement", "The pursuit of strategic professional development"], verbs: ["is", "leads to", "represents a pivotal milestone in"], effects: ["better pay", "job satisfaction", "the realization of long-term career objectives"] },
        { q: "Why is lifelong learning important?", causes: ["Learning new things", "Continuous education", "The commitment to perpetual intellectual growth"], verbs: ["helps", "develops", "is essential for"], effects: ["stay smart", "better career", "the maintenance of professional relevancy in a dynamic market"] },
        { q: "What do you like about your city?", causes: ["Living here", "Urban environment", "The distinctive socio-cultural fabric of my city"], verbs: ["is nice because", "offers", "provides a unique landscape for"], effects: ["it is fun", "high quality of life", "a high standard of communal well-being and diversity"] },
        { q: "How has technology changed your life?", causes: ["Using devices", "Technological integration", "The pervasive assimilation of digital tools"], verbs: ["makes life", "changes", "fundamentally reshapes"], effects: ["faster tasks", "easier communication", "the optimization of interpersonal and professional efficiency"] },
        { q: "Should students do internships?", causes: ["Working while studying", "Practical experience", "The acquisition of hands-on professional exposure"], verbs: ["helps", "improves", "serves as a catalyst for"], effects: ["get jobs", "career readiness", "the successful transition from academic to professional life"] },
        
        { q: "Why do people migrate to Australia?", causes: ["Moving there", "Global mobility", "The pursuit of enhanced socio-economic opportunities in Australia"], verbs: ["is", "leads to", "is driven by"], effects: ["better life", "new start", "the integration into a high-standard multicultural society"] },
        { q: "What is the benefit of skilled migration?", causes: ["Filling jobs", "Workforce needs", "The strategic importation of critical human capital"], verbs: ["helps", "supports", "substantially addresses"], effects: ["growth", "success", "the alleviation of localized labor market shortages"] },
        { q: "Is the visa process difficult?", causes: ["Doing paperwork", "Visa applications", "The complexity of Australian immigration administration"], verbs: ["is", "demands", "necessitates"], effects: ["too hard", "long waits", "the rigorous verification of applicant eligibility"] },
        { q: "Why choose an Australian university?", causes: ["Studying there", "Academic pursuit", "The international reputation of Australian higher education"], verbs: ["is", "offers", "is recognized for"], effects: ["good degrees", "career start", "the acquisition of globally recognized academic credentials"] },
        { q: "Is employer sponsorship important?", causes: ["Getting a boss", "Corporate sponsorship", "The reliance on employer-sponsored visa pathways"], verbs: ["helps", "secures", "is pivotal for"], effects: ["get a job", "visa status", "the expedited stabilization of long-term work rights"] },
        { q: "How important is English proficiency?", causes: ["Speaking English", "Language skills", "The mandatory demonstration of advanced English proficiency"], verbs: ["is", "ensures", "serves as a prerequisite for"], effects: ["communication", "success", "the seamless integration into Australian professional spheres"] },
        { q: "What is a skills assessment?", causes: ["Checking skills", "Professional assessment", "The mandatory external evaluation of professional qualifications"], verbs: ["helps", "verifies", "is fundamental to"], effects: ["get points", "approval", "the validation of competency against national standards"] },
        { q: "Is the cost of living high?", causes: ["Paying bills", "Living costs", "The financial requirements of residing in Australian cities"], verbs: ["is", "impacts", "requires"], effects: ["hard to save", "budgeting", "the necessity for comprehensive financial preparedness"] },
        { q: "Why move for skilled work?", causes: ["Working abroad", "Skilled migration", "The deliberate relocation for specialized occupational roles"], verbs: ["helps", "builds", "is a catalyst for"], effects: ["better pay", "growth", "the optimization of individual professional trajectory"] },
        { q: "Is the points test fair?", causes: ["Getting points", "Migration scoring", "The objective framework of the points-based selection system"], verbs: ["is", "ranks", "is designed to"], effects: ["hard to pass", "selection", "the merit-based identification of highly skilled candidates"] },
        { q: "What is the role of the PR visa?", causes: ["Getting residency", "Permanent residency", "The acquisition of Australian Permanent Residency status"], verbs: ["means", "grants", "is the ultimate goal for"], effects: ["stay long", "freedom", "the attainment of long-term residency and civil rights"] },
        { q: "Is healthcare covered for migrants?", causes: ["Medical care", "Health insurance", "The maintenance of mandatory private health insurance coverage"], verbs: ["is", "requires", "is essential for"], effects: ["safety", "low cost", "the mitigation of excessive out-of-pocket medical expenditures"] },
        { q: "Why is local work experience valued?", causes: ["Local jobs", "Australian experience", "The preference for domestic professional experience"], verbs: ["is", "demonstrates", "is critical for"], effects: ["trust", "good work", "the proven familiarity with Australian workplace culture"] },
        { q: "Should you hire a migration agent?", causes: ["Getting help", "Professional assistance", "The engagement of a registered migration agent"], verbs: ["helps", "secures", "substantially improves"], effects: ["no errors", "success", "the professional management of complex visa compliance"] },
        { q: "Is Australia a good place for families?", causes: ["Living with family", "Family migration", "The pursuit of an optimal environment for child development"], verbs: ["is", "provides", "is highly regarded for"], effects: ["safe life", "good school", "the provision of superior social and educational infrastructure"] },
        { q: "How to prepare for visa payments?", causes: ["Paying fees", "Visa application costs", "The budgeting for non-refundable government visa application charges"], verbs: ["is", "requires", "necessitates"], effects: ["save money", "readiness", "the careful financial planning of migration expenses"] },
        { q: "Is the rural migration path good?", causes: ["Living in regions", "Regional migration", "The incentivized migration to regional Australian centers"], verbs: ["helps", "supports", "is strategically promoted for"], effects: ["less competition", "PR fast", "the accelerated path to residency in underserved areas"] },
        { q: "Does your occupation matter?", causes: ["Choosing a job", "Occupation lists", "The critical relevance of the Skilled Occupation List (SOL)"], verbs: ["is", "dictates", "is the primary determinant of"], effects: ["get visa", "options", "the eligibility for specific skilled visa subclasses"] },
        { q: "What is the health examination?", causes: ["Medical checks", "Health assessment", "The mandatory submission to comprehensive health screenings"], verbs: ["is", "verifies", "is vital for"], effects: ["safety", "approval", "the assurance of public health and safety standards"] },
        { q: "Is a job offer mandatory?", causes: ["Finding a job", "Employment offer", "The procurement of a formal offer of employment"], verbs: ["is", "facilitates", "is often required for"], effects: ["start work", "certainty", "the fulfillment of specific employer-sponsored criteria"] },
        { q: "Why is character clearance vital?", causes: ["Police checks", "Character assessment", "The stringent requirement for clean criminal record history"], verbs: ["is", "verifies", "is fundamental to"], effects: ["no risk", "entry", "the maintenance of national security and social integrity"] },
        { q: "How to handle document translations?", causes: ["Translating docs", "Certification of documents", "The professional certification of translated official documents"], verbs: ["is", "supports", "is necessary for"], effects: ["no errors", "validity", "the formal recognition of international documentation"] },
        { q: "Is social integration challenging?", causes: ["Fitting in", "Cultural adaptation", "The process of adapting to Australian social norms"], verbs: ["is", "impacts", "requires"], effects: ["stress", "learning", "the long-term successful assimilation into the community"] },
        { q: "Are bridging visas common?", causes: ["Waiting for visa", "Bridging visa status", "The management of temporary residency via bridging visas"], verbs: ["is", "covers", "is essential for"], effects: ["stay legal", "time", "the continuous maintenance of lawful presence during processing"] },
        { q: "What is a 485 visa?", causes: ["Working after study", "Graduate visa", "The utilization of the Temporary Graduate (subclass 485) visa"], verbs: ["helps", "allows", "serves as a bridge for"], effects: ["get experience", "work rights", "the transition from academic study to professional employment"] },
        { q: "Why provide biometric data?", causes: ["Scanning data", "Biometric collection", "The mandatory provision of biometric identifiers"], verbs: ["is", "verifies", "is required for"], effects: ["no fraud", "security", "the authentic verification of individual identity"] },
        { q: "Is the visa processing time unpredictable?", causes: ["Waiting for news", "Processing delays", "The inherent volatility of government visa processing times"], verbs: ["is", "causes", "necessitates"], effects: ["anxiety", "delay", "the exercise of patience and strategic long-term planning"] },
        { q: "How to prepare for an interview?", causes: ["Talking to officials", "Visa interview", "The professional preparation for immigration-related interviews"], verbs: ["helps", "builds", "is essential for"], effects: ["clear facts", "success", "the articulate representation of migration intent"] },
        { q: "Is the appeal process difficult?", causes: ["Fighting rejection", "Migration review", "The formal process of appealing visa refusals"], verbs: ["is", "demands", "requires"], effects: ["cost", "stress", "the need for robust legal and evidentiary documentation"] },
        { q: "Why is compliance important?", causes: ["Following rules", "Visa compliance", "The strict adherence to Australian migration regulations"], verbs: ["is", "avoids", "is vital for"], effects: ["no ban", "staying", "the prevention of visa cancellation and deportation"] },
        { q: "Can family members migrate too?", causes: ["Bringing family", "Dependent visa", "The inclusion of eligible dependents in migration applications"], verbs: ["helps", "supports", "is provided for by"], effects: ["stay together", "unit", "the collective migration of the nuclear family unit"] },
        { q: "What is the Expression of Interest (EOI)?", causes: ["Applying for notice", "Expression of interest", "The formal submission of an Expression of Interest (EOI)"], verbs: ["is", "initiates", "serves as a prerequisite for"], effects: ["invitation", "start", "the competitive invitation process for skilled subclasses"] },
        { q: "Is there a retirement visa?", causes: ["Moving to retire", "Retirement migration", "The existence of specific pathways for retiree migration"], verbs: ["is", "offers", "is structured for"], effects: ["rest", "life", "the legal residence of retirees without workforce participation"] },
        { q: "How does the economy affect migration?", causes: ["Market shifts", "Economic demand", "The correlation between economic growth and migration levels"], verbs: ["is", "drives", "fundamentally impacts"], effects: ["more jobs", "rules", "the adaptive adjustment of national immigration quotas"] },
        { q: "Is networking helpful for work?", causes: ["Talking to peers", "Professional networking", "The engagement in industry-specific networking channels"], verbs: ["helps", "builds", "is crucial for"], effects: ["job leads", "contacts", "the expansion of professional employment prospects"] },
        { q: "How to show financial capacity?", causes: ["Showing bank stats", "Proof of funds", "The formal demonstration of sufficient financial liquidity"], verbs: ["is", "verifies", "is mandatory for"], effects: ["no burden", "entry", "the assurance of self-sufficiency during Australian residence"] },
        { q: "What is a visa condition?", causes: ["Rules on visa", "Visa conditions", "The obligation to abide by specific visa-bound conditions"], verbs: ["is", "governs", "is binding for"], effects: ["no work", "stay limit", "the legal regulation of conduct during temporary stay"] },
        { q: "Should you check the DHA website?", causes: ["Reading news", "DHA information", "The regular monitoring of Department of Home Affairs updates"], verbs: ["helps", "builds", "is vital for"], effects: ["no mistake", "up to date", "the avoidance of misinformation and outdated procedures"] },
        { q: "Is Australia’s diversity a strength?", causes: ["Meeting many people", "Multiculturalism", "The systematic promotion of a multicultural national identity"], verbs: ["is", "supports", "is recognized as"], effects: ["new ideas", "vibrant", "the enrichment of social and professional perspectives"] },
        { q: "How to handle visa extensions?", causes: ["Staying longer", "Visa extension", "The timely application for further periods of stay"], verbs: ["helps", "supports", "is necessary for"], effects: ["no break", "stability", "the lawful maintenance of residence before visa expiry"] },
        { q: "Why use the ImmiAccount portal?", causes: ["Using the portal", "Online application", "The utilization of the centralized ImmiAccount application system"], verbs: ["helps", "speeds", "is standard for"], effects: ["easy track", "fast", "the efficient management of digital visa submissions"] },
        { q: "Are professional references required?", causes: ["Getting letters", "Work references", "The provision of documented evidence of professional experience"], verbs: ["is", "verifies", "is essential for"], effects: ["truth", "claims", "the substantiation of work-experience eligibility criteria"] },
        { q: "How to stay updated on rules?", causes: ["Learning rules", "Regulatory changes", "The continuous awareness of shifts in immigration legislation"], verbs: ["helps", "builds", "is crucial for"], effects: ["no shock", "plan ahead", "the proactive adaptation to migration policy fluctuations"] },
        { q: "What is a migration agent registration?", causes: ["Checking IDs", "MARA registration", "The verification of a migration agent’s registration (MARA)"], verbs: ["is", "ensures", "is mandatory for"], effects: ["trust", "protection", "the assurance of ethical and competent legal representation"] },
        { q: "Is it hard to find housing?", causes: ["Getting a home", "Housing market", "The challenge of securing accommodation upon arrival"], verbs: ["is", "impacts", "requires"], effects: ["high cost", "time", "the proactive search for housing in a competitive market"] },
        { q: "Why is the visa label important?", causes: ["Seeing the visa", "Visa status", "The official electronic record of visa entitlement"], verbs: ["is", "confirms", "is vital for"], effects: ["legal status", "travel", "the unequivocal documentation of legal entry rights"] },
        { q: "How to prepare for your arrival?", causes: ["Planning the trip", "Migration logistics", "The systematic coordination of pre-arrival logistics"], verbs: ["helps", "builds", "is fundamental for"], effects: ["no stress", "settle fast", "the seamless transition to life in a new country"] },
        { q: "What is the Australian values statement?", causes: ["Signing values", "Values statement", "The formal acknowledgment of Australian societal values"], verbs: ["is", "builds", "is required for"], effects: ["agreement", "respect", "the shared commitment to democratic and social standards"] },
        { q: "Is professional growth easier in Australia?", causes: ["Working hard", "Career pathways", "The abundance of professional advancement opportunities"], verbs: ["is", "facilitates", "is conducive to"], effects: ["success", "reach top", "the pursuit of high-level professional achievement"] },
        { q: "Why choose Australia for your future?", causes: ["Thinking ahead", "Future planning", "The strategic investment in a future within Australia"], verbs: ["is", "builds", "represents a commitment to"], effects: ["stability", "safety", "the long-term security of personal and professional endeavors"] }
    ];

    // Auto-filler for the remaining cases to ensure you have 50 ready
    for(let i = 9; i <= 50; i++) {
        data.push({ q: `Discussion Prompt ${i}`, causes: ["Basic topic", "Functional focus", "The analytical scope of..."], verbs: ["relates to", "highlights", "substantiates the claim that"], effects: ["simple result", "clear outcome", "a profound systemic implication for society"] });
    }

    let current = 0;
    function init() {
        document.getElementById('title').innerText = `Discussion Mastery (${current + 1}/50)`;
        document.getElementById('prompt').innerHTML = `<strong>Prompt:</strong> ${data[current].q}`;
        ['cause', 'verb', 'effect'].forEach(id => {
            document.getElementById(id).innerHTML = '<option value="">-- Select --</option>' + data[current][id + 's'].map((opt, i) => `<option value="${i}">${opt}</option>`).join('');
        });
        document.getElementById('output').style.display = 'none';
        document.getElementById('tts').style.display = 'none';
    }

    function evaluateDrill() {
        const c = document.getElementById('cause').value, v = document.getElementById('verb').value, e = document.getElementById('effect').value;
        const out = document.getElementById('output');
        if(c==="" || v==="" || e==="") return;
        let score = (parseInt(c) + parseInt(v) + parseInt(e));
        out.style.display = 'block';
        out.innerHTML = `<strong>Score: ${score === 6 ? 'Band 9.0' : score >= 4 ? 'Band 8.0' : 'Band 6.5'}</strong><br><em>"${data[current].causes[c]} ${data[current].verbs[v]} ${data[current].effects[e]}."</em>`;
        document.getElementById('tts').style.display = 'block';
    }

    function speakResult() {
        const text = `${data[current].causes[document.getElementById('cause').value]} ${data[current].verbs[document.getElementById('verb').value]} ${data[current].effects[document.getElementById('effect').value]}.`;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }
    function nextCase() { current = (current + 1) % data.length; init(); }
    init();
</script>
</body>
</html>
