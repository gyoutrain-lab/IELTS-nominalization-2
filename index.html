<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integrated Band 9 Master-Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dropdown { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #3498db; border-radius: 6px; background: white; cursor: pointer; }
        button { background: #2c3e50; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; padding: 20px; background: #ecf0f1; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Band 9 Integrated Compiler</h2>
    <p id="prompt"><strong>Prompt:</strong> Loading...</p>

    <select id="cause" class="dropdown"><option value="">-- Choose Nominalized Cause --</option></select>
    <select id="verb" class="dropdown"><option value="">-- Choose Academic Verb --</option></select>
    <select id="effect" class="dropdown"><option value="">-- Choose Nominalized Outcome --</option></select>
    
    <button onclick="render()">Submit & Evaluate</button>
    
    <div id="output"></div>
</div>

<script>
    const data = [
        { 
            q: "Smoking makes people have more health problems.",
            causes: ["The widespread consumption of tobacco products", "Prolonged exposure to nicotine"],
            verbs: ["correlates with", "is a primary determinant of"],
            effects: ["the proliferation of chronic respiratory ailments", "the degradation of cardiovascular health"]
        },
        { 
            q: "Using computers helps students learn faster.",
            causes: ["The integration of digital learning technologies", "The adoption of computer-aided instruction"],
            verbs: ["facilitates", "accelerates"],
            effects: ["the optimization of pedagogical efficiency", "the expedited acquisition of knowledge"]
        }
    ];

    let current = 0;

    function init() {
        document.getElementById('prompt').innerHTML = `<strong>Prompt:</strong> ${data[current].q}`;
        ['cause', 'verb', 'effect'].forEach(id => {
            let el = document.getElementById(id);
            el.innerHTML = '<option value="">-- Choose --</option>' + 
                data[current][id + 's'].map(opt => `<option value="${opt}">${opt}</option>`).join('');
        });
    }

    function render() {
        const c = document.getElementById('cause').value;
        const v = document.getElementById('verb').value;
        const e = document.getElementById('effect').value;
        const out = document.getElementById('output');
        
        out.style.display = 'block';
        if(!c || !v || !e) {
            out.innerHTML = "<strong>Score: N/A</strong> <br> Please complete all fields to generate your Band 9 evaluation.";
        } else {
            out.innerHTML = `<strong>Estimated Band: 9.0</strong><br><em>"${c} ${v} ${e}."</em>`;
        }
    }

    init();
</script>
</body>
</html>
